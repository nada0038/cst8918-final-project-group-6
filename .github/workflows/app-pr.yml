name: App Build and Deploy (Test)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          az acr login --name acrremix6

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t acrremix6.azurecr.io/weather-app:$IMAGE_TAG .
          docker push acrremix6.azurecr.io/weather-app:$IMAGE_TAG

  deploy-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Test Credentials
        run: |
          az aks get-credentials --resource-group cst8918-final-project-group-GROUP_6 --name aks-test --overwrite-existing

      - name: Set Image Tag and Deploy
        run: |
          sed -i "s|image: .*|image: acrremixGROUP_6.azurecr.io/weather-app:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
